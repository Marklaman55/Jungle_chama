services:
  - type: web
    name: jungle-chama-backend
    env: node
    plan: starter
    rootDir: backend
    healthCheckPath: /health
    buildCommand: cd ../frontend && npm install && npm run build -- --outDir ../backend/dist 2>/dev/null || (cd ../backend && npm prune && npm install && npx tsc)
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
- key: ENABLE_WHATSAPP
         value: "false"
       - key: WHATSAPP_VERIFY_TOKEN
         value: "jungle_chama_token"
      - key: FRONTEND_URL
        value: https://jungle-chama.vercel.app
      - key: MONGO_URI
        fromSecret: MONGO_URI
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: MPESA_ENV
        fromSecret: MPESA_ENV
      - key: MPESA_CONSUMER_KEY
        fromSecret: MPESA_CONSUMER_KEY
      - key: MPESA_CONSUMER_SECRET
        fromSecret: MPESA_CONSUMER_SECRET
      - key: MPESA_SHORTCODE
        fromSecret: MPESA_SHORTCODE
      - key: MPESA_PASSKEY
        fromSecret: MPESA_PASSKEY
      - key: MPESA_CALLBACK_URL
        fromSecret: MPESA_CALLBACK_URL
      - key: EMAIL_USER
        fromSecret: EMAIL_USER
      - key: EMAIL_PASS
        fromSecret: EMAIL_PASS
      - key: CLOUDINARY_CLOUD_NAME
        fromSecret: CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_API_KEY
        fromSecret: CLOUDINARY_API_KEY
      - key: CLOUDINARY_API_SECRET
        fromSecret: CLOUDINARY_API_SECRET